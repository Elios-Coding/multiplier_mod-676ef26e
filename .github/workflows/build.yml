name: Build Fabric Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12.1'

      - name: Build with Gradle
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew build --no-daemon --stacktrace --info --refresh-dependencies
          else
            gradle build --no-daemon --stacktrace --info --refresh-dependencies
          fi

      - name: Upload jar artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mod-jar
          path: build/libs/*.jar
          if-no-files-found: warn
